<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIVIC CARE — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/surfaces.css">
  <style>
    .dashboard-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; padding: 1.5rem; background: var(--bg-secondary); border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
    .sidebar-brand { font-size: 1.2rem; font-weight: 900; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
    .sidebar-brand span { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
    .sidebar-nav .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: all 0.2s; }
    .sidebar-nav .nav-item:hover, .sidebar-nav .nav-item.active { background: rgba(59,130,246,0.12); color: var(--text-primary); }
    .sidebar-nav .nav-item .nav-icon { font-size: 1.2rem; }
    .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .user-info { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; }
    .user-name { font-weight: 600; font-size: 0.9rem; }
    .user-role { font-size: 0.75rem; color: var(--text-muted); }

    .main-content { margin-left: 260px; flex: 1; padding: 2rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .top-bar h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }
    .top-bar .badge-admin { padding: 0.3rem 0.8rem; border-radius: 999px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); font-size: 0.75rem; color: var(--accent-purple); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { padding: 1.5rem; }
    .stat-card .stat-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .stat-card .stat-label { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem; }
    .stat-card .stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .section-header h2 { font-size: 1.3rem; font-weight: 700; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.75rem 1rem; color: var(--text-muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.06); }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .status-badge { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .status-badge.pending { background: rgba(245,158,11,0.15); color: var(--accent-orange); }
    .status-badge.resolved { background: rgba(16,185,129,0.15); color: var(--accent-green); }
    .status-badge.critical { background: rgba(239,68,68,0.15); color: var(--accent-red); }
    .status-badge.active { background: rgba(59,130,246,0.15); color: var(--accent-blue); }

    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }

    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 1rem 0.5rem; }
      .sidebar-brand span, .sidebar-nav .nav-item span:not(.nav-icon), .user-info .user-name, .user-info .user-role { display: none; }
      .sidebar-brand { justify-content: center; }
      .sidebar-nav .nav-item { justify-content: center; padding: 0.75rem; }
      .sidebar-footer .user-info { justify-content: center; }
      .main-content { margin-left: 60px; padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">&#127963; <span>CIVIC CARE</span></div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active"><span class="nav-icon">&#128202;</span> <span>Dashboard</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">&#128196;</span> <span>All Issues</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">&#128101;</span> <span>Users</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">&#127973;</span> <span>Departments</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">&#128200;</span> <span>Reports</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">&#128736;</div>
          <div>
            <div class="user-name" id="admin-name">Administrator</div>
            <div class="user-role">ADMIN</div>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-secondary" style="width:100%;padding:0.5rem;font-size:0.85rem;">&#8592; Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div>
          <h1>Admin Dashboard</h1>
          <div class="badge-admin">&#128736; Platform Admin</div>
        </div>
        <button id="theme-toggle" class="btn btn-secondary" style="padding:0.4rem 0.8rem;font-size:0.8rem;">&#127769;</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card glass-card">
          <div class="stat-icon">&#128196;</div>
          <div class="stat-value" id="stat-total">--</div>
          <div class="stat-label">Total Complaints</div>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-icon">&#128101;</div>
          <div class="stat-value" id="stat-users">--</div>
          <div class="stat-label">Registered Users</div>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-icon">&#127973;</div>
          <div class="stat-value" id="stat-depts">7</div>
          <div class="stat-label">Departments</div>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-icon">&#9989;</div>
          <div class="stat-value" id="stat-resolved">--</div>
          <div class="stat-label">Resolved</div>
        </div>
      </div>

      <div class="section-header">
        <h2>&#128196; Recent Complaints</h2>
      </div>

      <div class="table-wrap glass-card" style="padding:0;overflow:hidden;">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Department</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="complaints-body">
            <tr>
              <td colspan="6" class="empty-state">Loading complaints data... <span style="display:inline-block;animation:spin 1s linear infinite;">&#8635;</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const token = localStorage.getItem('token');

    if (!token || user.role !== 'ADMIN') {
      window.location.href = '/login.html';
    }

    document.getElementById('admin-name').textContent = user.name || 'Administrator';

    async function loadStats() {
      try {
        const res = await fetch('/api/complaints/stats', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('stat-total').textContent = data.total ?? '--';
          document.getElementById('stat-resolved').textContent = data.resolved ?? '--';
        }
      } catch {}
    }

    async function loadComplaints() {
      try {
        const res = await fetch('/api/complaints', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        const tbody = document.getElementById('complaints-body');
        if (!data.complaints?.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No complaints found.</td></tr>';
          return;
        }
        tbody.innerHTML = data.complaints.slice(0, 10).map(c => `
          <tr>
            <td><strong>${c.title || 'Untitled'}</strong></td>
            <td>${c.aiCategory || '--'}</td>
            <td><span class="status-badge ${(c.priority||'').toLowerCase()}">${c.priority || '--'}</span></td>
            <td><span class="status-badge ${(c.status||'').toLowerCase().replace(/_/g,'-')}">${c.status || '--'}</span></td>
            <td>${c.departmentId?.name || '--'}</td>
            <td style="font-size:0.8rem;color:var(--text-muted);">${new Date(c.createdAt).toLocaleDateString()}</td>
          </tr>
        `).join('');
        document.getElementById('stat-total').textContent = data.complaints.length;
      } catch {
        const tbody = document.getElementById('complaints-body');
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Could not load data. API may be unavailable.</td></tr>';
      }
    }

    loadStats();
    loadComplaints();

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    const style = document.createElement('style');
    style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);
  </script>
</body>
</html>
